<!-- Slot de In-Feed Native Ads. 
     • min-height: 250px apenas quando o script do AdSense estiver presente (via classe .has-ad).
     • Sem anúncio: .ad-slot-infeed colapsa para height:0 / display:none via CSS,
       eliminando o "buraco preto" no layout sem injetar JS extra.
-->
<aside class="ad-slot-infeed w-full bento-card border border-dashed border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-surface overflow-hidden mb-8 shadow-inner"
       aria-label="Espaço publicitário">

         Código Assíncrono do Google AdSense

         "has-ad" na tag <aside> acima para restaurar o min-height.
    ================================================================
