{% load static %}
{% load i18n %}
<!-- Card de Postagem no formato Bento -->
<!-- Usamos mb-6 para espaçamento, bento-card para bordas arredondadas modernas, e hover-glow -->
<article class="bento-card bg-white dark:bg-surface border border-gray-100 dark:border-white/5 flex flex-col mb-8 overflow-hidden hover-glow">
    
    <!-- Post Header -->
    <div class="flex items-center justify-between p-4 bg-white/50 dark:bg-black/20 backdrop-blur-sm z-10 relative">
        <div class="flex items-center space-x-3">
            <a href="{% url 'profiles:profile' post.author.username %}" class="block focus:outline-none btn-micro">
                <img class="h-10 w-10 rounded-full object-cover shadow-sm bg-gray-200 dark:bg-gray-800 ring-2 ring-white dark:ring-gray-800" src="https://ui-avatars.com/api/?name={{ post.author.username|default:'Author' }}&background=random" alt="Avatar de {{ post.author }}">
            </a>
            <div>
                <a href="{% url 'profiles:profile' post.author.username %}" class="text-[15px] font-bold text-gray-900 dark:text-gray-50 hover:underline leading-tight block">
                    {{ post.author.username }}
                </a>
                <p class="text-xs text-gray-500 dark:text-gray-400 block">{{ post.created_at }}</p>
            </div>
        </div>
        <button class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 p-2 rounded-full focus:outline-none focus:bg-gray-100 dark:focus:bg-gray-800 transition-colors btn-micro">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z"></path></svg>
        </button>
    </div>

    <!-- Post Media (Proporção 4:5 - Ideal para Instagram/Feeds Mobile) -->
    <!-- 'aspect-[4/5]' mantém o aspecto. Max-height de 600px garante que não ocupe a tela toda no Desktop e previne grande CLS -->
    <div class="relative w-full aspect-[4/5] sm:aspect-[4/5] sm:max-h-[600px] bg-gray-100 dark:bg-black flex items-center justify-center overflow-hidden border-y border-gray-100 dark:border-white/5">
        <!-- Uso de lazy loading nativo -->
        <img class="w-full h-full object-cover" 
             loading="lazy" 
             decoding="async" 
             src="{{ post.image_url|default:'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1080&auto=format&fit=crop' }}" 
             alt="Postagem de imagem"
             width="1080" height="1350">
    </div>

    <!-- Post Content & Interactions -->
    <div class="p-4 bg-white/50 dark:bg-black/20 backdrop-blur-sm">
        <!-- Ações do Post -->
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center space-x-4">
                <!-- Botão Curtir -->
                <!-- A classe btn-like é processada no main.js via delegação -->
                <button class="btn-like btn-micro flex items-center text-gray-600 dark:text-gray-300 hover:text-red-500 dark:hover:text-red-500 focus:outline-none transition-colors group">
                    <svg class="w-7 h-7 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
                    </svg>
                </button>
                <!-- Botão Comentar -->
                <button class="btn-micro flex items-center text-gray-600 dark:text-gray-300 hover:text-blue-500 dark:hover:text-blue-400 focus:outline-none transition-colors group">
                    <svg class="w-7 h-7 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 20.25c4.97 0 9-3.694 9-8.25s-4.03-8.25-9-8.25S3 7.444 3 12c0 2.104.859 4.023 2.273 5.48.432.447.74 1.04.586 1.641a4.483 4.483 0 01-.923 1.785A5.969 5.969 0 006 21c1.282 0 2.47-.402 3.445-1.087.81.22 1.668.337 2.555.337z" />
                    </svg>
                </button>
                <!-- Botão Compartilhar -->
                <button class="btn-micro flex items-center text-gray-600 dark:text-gray-300 hover:text-green-500 dark:hover:text-green-400 focus:outline-none transition-colors group">
                    <svg class="w-7 h-7 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M7.217 10.907a2.25 2.25 0 100 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186l9.566-5.314m-9.566 7.5l9.566 5.314m0 0a2.25 2.25 0 103.935 2.186 2.25 2.25 0 00-3.935-2.186zm0-12.814a2.25 2.25 0 103.933-2.185 2.25 2.25 0 00-3.933 2.185z" />
                    </svg>
                </button>
            </div>
            <!-- Botão Guardar/Salvar -->
            <button class="btn-micro text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white focus:outline-none transition-colors group">
                <svg class="w-7 h-7 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0111.186 0z" />
                </svg>
            </button>
        </div>

        <!-- Curtidas, Legenda e Comentários In-Feed -->
        <div class="text-sm">
            <p class="font-bold text-gray-900 dark:text-gray-100 mb-1 tracking-tight">{{ post.like.count }} {% translate 'like(s)' %} </p>
            
            <div class="line-clamp-2 text-gray-800 dark:text-gray-300 font-normal mt-1 leading-relaxed">
                <a href="#" class="font-bold text-gray-900 dark:text-white mr-1 hover:underline">{{ post.author.username }}</a>
                {{ post.text }}
            </div>
            
            <!-- Link para abrir view de comentários ou modal -->
            <button class="text-gray-500 dark:text-gray-500 font-medium mt-2 hover:underline focus:outline-none">
                View all {{ post.comments.count }} comments
            </button>
        </div>
    </div>
</article>
