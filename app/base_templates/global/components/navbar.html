{% load static %}
{% load i18n %}
<!-- Desktop & Tablet Navbar -->
<nav class="fixed top-0 w-full z-40 liquid-glass transition-colors duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <!-- Logo -->
            <div class="flex-shrink-0 flex items-center">
                <a href="/" class="text-2xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary">
                    Socialnet
                </a>
            </div>

            <!-- Barra de Busca Avançada (Somente Desktop) -->
            <div class="hidden md:flex flex-1 max-w-lg mx-8">
                <div class="relative w-full">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                    <!-- Adaptação para Dark Mode em Inputs (Suave) -->
                    <input type="text" 
                        class="block w-full pl-10 pr-3 py-2 border border-transparent rounded-full leading-5 bg-gray-100/80 dark:bg-gray-800/80 backdrop-blur text-gray-900 dark:text-gray-100 placeholder-gray-500 focus:outline-none focus:bg-white dark:focus:bg-gray-700 focus:ring-2 focus:ring-primary focus:border-transparent transition duration-200 ease-in-out sm:text-sm shadow-inner" 
                        placeholder="{% translate 'Search for posts, people' %}...">
                </div>
            </div>

            <!-- Ícones da Direita / Perfil -->
            <div class="hidden md:flex items-center space-x-3">
                <button id="theme-toggle" class="p-2 rounded-full text-gray-500 hover:text-primary dark:hover:text-yellow-400 hover:bg-gray-100 dark:hover:bg-gray-800 focus:outline-none transition-colors duration-300">
                    <!-- Icon Light/Dark Mode -->
                    <svg class="w-6 h-6 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    <svg class="w-6 h-6 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                </button>
                <a href="#" class="p-2 rounded-full text-gray-500 hover:text-primary hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors relative">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                    <!-- Indicador de Notificação Não Lida -->
                    <span class="absolute top-1.5 right-1.5 block h-2.5 w-2.5 rounded-full bg-red-500 ring-2 ring-white dark:ring-gray-900"></span>
                </a>
                <div class="relative ml-2">
                    <button class="flex text-sm border-2 border-transparent rounded-full focus:outline-none focus:border-primary transition duration-150 ease-in-out">
                        <!-- Placeholder Dinâmico -->
                        <img class="h-9 w-9 rounded-full object-cover" src="https://ui-avatars.com/api/?name={{ request.user.username|default:'U' }}&background=3B82F6&color=fff" alt="Perfil do Usuário">
                    </button>
                </div>
            </div>
            
            <!-- Mobile Menu/Theme Toggle (Header limit) -->
            <div class="md:hidden flex items-center space-x-2">
                <button id="theme-toggle-mobile" class="p-2 text-gray-500 hover:text-gray-900 dark:hover:text-gray-100 focus:outline-none transition duration-150 rounded-full bg-gray-100 dark:bg-gray-800" onclick="document.getElementById('theme-toggle').click()">
                    <!-- Simples ícone lua -->
                    <svg class="w-5 h-5 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    <svg class="w-5 h-5 hidden dark:block text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                </button>
            </div>
        </div>
    </div>
</nav>

<!-- Mobile Bottom Navigation (Aparece apenas até md) 
     - Utiliza z-50 para sobrepor posts 
     - Usa pb-safe para lidar com barras do iOS 
-->
<nav class="md:hidden fixed bottom-0 w-full z-50 liquid-glass pb-safe rounded-t-3xl shadow-[0_-4px_25px_rgba(0,0,0,0.05)] dark:shadow-[0_-4px_25px_rgba(0,0,0,0.5)] border-t border-white/20">
    <div class="flex justify-around items-center h-[72px] px-2 text-gray-500 dark:text-gray-400">
        <!-- Ícones formatados para touch targets amigáveis (48x48min) -->
        <a href="/" class="p-2 text-primary flex flex-col items-center btn-micro w-16">
            <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[10px] font-semibold">{% translate 'Feed' %}</span>
        </a>
        <a href="#" class="p-2 hover:text-gray-900 dark:hover:text-gray-100 flex flex-col items-center btn-micro w-16 transition-colors">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <span class="text-[10px] font-medium">{% translate 'Search' %}</span>
        </a>
        
        <!-- Botão central de Post (+) Em destaque -->
        <div class="relative -top-6">
            <a href="#" class="flex items-center justify-center w-14 h-14 bg-gradient-to-tr from-primary to-secondary rounded-full text-white shadow-lg btn-micro transform border-[5px] border-[#f8fafc] dark:border-[#121212] hover-glow">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path></svg>
            </a>
        </div>
        
        <a href="#" class="p-2 hover:text-gray-900 dark:hover:text-gray-100 flex flex-col items-center btn-micro w-16 transition-colors relative">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
            <span class="absolute top-2 right-4 block h-2 w-2 rounded-full bg-red-500 ring-2 ring-white dark:ring-[#121212]"></span>
            <span class="text-[10px] font-medium">{% translate 'Alerts' %}</span>
        </a>
        <a href="#" class="p-2 hover:text-gray-900 dark:hover:text-gray-100 flex flex-col items-center btn-micro w-16 transition-colors">
            <img class="h-6 w-6 rounded-full object-cover mb-1 border border-transparent dark:border-gray-700" src="https://ui-avatars.com/api/?name={{ request.user.username|default:'U' }}&background=3B82F6&color=fff" alt="Perfil do Usuário">
            <span class="text-[10px] font-medium">{% translate 'Profile' %}</span>
        </a>
    </div>
</nav>

<!-- CSS Especial para Padding Safe do iPhone -->
<style>
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
</style>
